approval_gates:
  - gate_id: "spec_gate"
    required: false
    trigger:
      - "after initial planning"
    approver: "human"
    decision_options:
      - "approve"
      - "revise"
      - "reduce scope"

  - gate_id: "scope_change_gate"
    required: true
    trigger:
      - "major scope increase"
      - "major architecture change"
      - "timeline or budget expansion"
    approver: "human"
    decision_options:
      - "approve"
      - "reject"
      - "request alternative"

  - gate_id: "release_gate"
    required: true
    trigger:
      - "before production deployment"
      - "before final delivery for high-risk projects"
    approver: "human"
    decision_options:
      - "approve"
      - "hold"
      - "require fixes"
