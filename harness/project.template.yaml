schema_version: "harness.project/v1"

project:
  id: "replace-with-project-slug"
  name: "Replace with project name"
  type: "web-app"
  mode: "sprint"

runtime:
  platform: "codex"
  adapter_path: "harness/adapters/codex"
  execution_mode: "native-multi-agent"

brief:
  summary: |
    Replace this with a short project brief in 1-4 sentences.
  primary_outcome: "What must exist by the end of the run?"
  user_value: "Why does this project matter to the user?"
  non_goals:
    - "What should the harness avoid building?"

product_context:
  target_users:
    - "Who is this for?"
  core_jobs:
    - "What jobs should the product help users complete?"
  domain_notes:
    - "Important domain assumptions or terminology"

delivery:
  preferred_stack:
    frontend: "React/Vite or project-specific choice"
    backend: "FastAPI/Node/Rails or project-specific choice"
    database: "SQLite/PostgreSQL or project-specific choice"
  target_environments:
    - "local"
    - "staging"
  expected_deliverables:
    - "working application"
    - "readme"
    - "seed data if needed"

constraints:
  time_budget_hours: 4
  budget_priority: "medium"
  internet_policy: "restricted"
  must_use:
    - "List required tools, APIs, frameworks, or patterns"
  avoid:
    - "List anti-patterns, forbidden dependencies, or architecture constraints"

quality_bar:
  weighted_criteria:
    product_depth: 0.25
    functionality: 0.30
    design_quality: 0.15
    code_quality: 0.20
    reliability: 0.10
  pass_thresholds:
    product_depth: 7
    functionality: 8
    design_quality: 6
    code_quality: 7
    reliability: 7
  blocking_rules:
    - blocker_id: "primary_flow_broken"
      description: "Any broken primary user flow is an automatic fail."
    - blocker_id: "data_corruption_or_persistence_bug"
      description: "Any data corruption or persistence bug is an automatic fail."

workflow:
  planner_enabled: true
  generator_enabled: true
  evaluator_enabled: true
  sprint_contracts_enabled: true
  context_resets_enabled: false
  qa_round_limit: 3
  handoff_required: true
  auto_retry_failed_rounds: true
  max_build_rounds: 5

references:
  examples:
    - title: "Reference app or aesthetic"
      notes: "What should be borrowed or avoided?"
  source_material:
    - "Specs, docs, screenshots, or repo paths"

project_specific_checks:
  must_test:
    - check_id: "primary_user_journey"
      description: "Primary user journey"
    - check_id: "persistence_behavior"
      description: "Persistence behavior"
  nice_to_test:
    - check_id: "responsive_layout"
      description: "Responsiveness"
    - check_id: "empty_states"
      description: "Empty states"

ai_features:
  desired: false
  notes:
    - "If true, explain what agent or AI behavior should exist in-product"

policy_files:
  execution: "harness/policies/execution-policy.template.yaml"
  qa: "harness/policies/qa-policy.template.yaml"
  approval_gates: "harness/policies/approval-gates.template.yaml"
  stop_conditions: "harness/policies/stop-conditions.template.yaml"

approval:
  required_gates:
    - "spec_gate"
    - "release_gate"

artifacts:
  product_spec: "01-product-spec.md"
  roadmap: "02-roadmap.md"
  sprint_contract: "03-sprint-contract.md"
  build_handoff: "04-build-handoff.md"
  qa_report: "05-qa-report.md"
  run_log: "06-run-log.md"
  escalation_report: "07-escalation-report.md"
  final_handoff: "08-final-handoff.md"

completion_policy:
  require_all_thresholds: true
  require_core_flows_passing: true
  require_known_critical_bugs_resolved: true
  require_all_required_deliverables: true
  require_handoff_written: true
